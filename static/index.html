<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fleet Ops Copilot</title>
<style>
  :root {
    --navy: #0B2545; --blue: #2E74B5; --blue-bg: #E8F2FA;
    --amber: #D9A441; --amber-bg: #FFF8E8; --green: #2F855A; --green-bg: #EDF8F1;
    --red: #9B1C1C; --red-bg: #FDEEEE;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif; background: #f4f6f9; color: var(--navy); display: flex; flex-direction: column; height: 100vh; }
  header { background: var(--navy); color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 18px; margin: 0; flex: 1; }
  header select { padding: 6px 10px; border-radius: 6px; border: none; font-size: 14px; }
  #status { font-size: 12px; opacity: .8; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; max-width: 900px; width: 100%; margin: 0 auto; }
  .msg { margin-bottom: 16px; max-width: 85%; padding: 12px 14px; border-radius: 12px; white-space: pre-wrap; line-height: 1.45; }
  .user { background: var(--blue); color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
  .bot  { background: #fff; border: 1px solid #d6dee8; border-bottom-left-radius: 4px; }
  .bot.escalated { border-color: var(--red); background: var(--red-bg); }
  .evidence { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 11px; background: var(--green-bg); border: 1px solid var(--green); color: var(--navy); border-radius: 999px; padding: 2px 10px; }
  .chip.stale { background: var(--red-bg); border-color: var(--red); }
  .note { font-size: 12px; color: var(--red); margin-top: 6px; }
  .meta { font-size: 11px; color: #6b7a90; margin-top: 8px; }
  .msg img, .msg video { max-width: 220px; border-radius: 8px; display: block; margin-top: 8px; }
  form { background: #fff; border-top: 1px solid #d6dee8; padding: 12px 20px; }
  .formrow { max-width: 900px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; resize: none; border: 1px solid #c3ceda; border-radius: 10px; padding: 10px 12px; font: inherit; min-height: 44px; max-height: 140px; }
  button, label.attach { background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 11px 18px; font-size: 14px; cursor: pointer; }
  label.attach { background: #e8eef5; color: var(--navy); border: 1px solid #c3ceda; }
  button:disabled { opacity: .5; cursor: wait; }
  #previews { max-width: 900px; margin: 0 auto 8px; display: flex; gap: 8px; flex-wrap: wrap; }
  #previews .pv { position: relative; }
  #previews img, #previews video { height: 64px; border-radius: 8px; border: 1px solid #c3ceda; }
  #previews .x { position: absolute; top: -6px; right: -6px; background: var(--red); color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 18px; text-align: center; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>Fleet Ops Copilot <span style="font-weight:400;opacity:.7">read-only MVP</span></h1>
  <label>Role:
    <select id="role">
      <option value="dispatcher">Dispatcher</option>
      <option value="planner">Planner</option>
      <option value="driver">Driver</option>
      <option value="manager">Operations Manager</option>
    </select>
  </label>
  <span id="status">connecting...</span>
</header>

<div id="chat">
  <div class="msg bot">Hello! Ask me about schedules, delays, vehicle availability, or approved procedures.
Try: <i>"Why is route 18 delayed and what is the approved next step?"</i>
You can also attach a photo or short video (e.g. of a fault or blocked road).</div>
</div>

<form id="f">
  <div id="previews"></div>
  <div class="formrow">
    <label class="attach">📎 Attach
      <input id="files" type="file" accept="image/*,video/*" multiple hidden>
    </label>
    <textarea id="msg" placeholder="Ask about schedules, vehicles, drivers, or SOPs..." rows="1"></textarea>
    <button id="send" type="submit">Send</button>
  </div>
</form>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('f');
const msgEl = document.getElementById('msg');
const filesEl = document.getElementById('files');
const previews = document.getElementById('previews');
const sendBtn = document.getElementById('send');
let attachments = [];

fetch('/api/health').then(r => r.json()).then(h => {
  document.getElementById('status').textContent = `LLM: ${h.llm} · SOP search: ${h.sop_search_mode}`;
}).catch(() => document.getElementById('status').textContent = 'offline');

filesEl.addEventListener('change', () => {
  for (const f of filesEl.files) attachments.push(f);
  filesEl.value = '';
  renderPreviews();
});

function renderPreviews() {
  previews.innerHTML = '';
  attachments.forEach((f, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'pv';
    const el = document.createElement(f.type.startsWith('video/') ? 'video' : 'img');
    el.src = URL.createObjectURL(f);
    if (el.tagName === 'VIDEO') el.muted = true;
    const x = document.createElement('div');
    x.className = 'x'; x.textContent = '×';
    x.onclick = () => { attachments.splice(i, 1); renderPreviews(); };
    wrap.append(el, x);
    previews.append(wrap);
  });
}

function addMsg(cls, html) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.innerHTML = html;
  chat.append(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = msgEl.value.trim();
  if (!text) return;

  let userHtml = esc(text);
  for (const f of attachments) {
    const url = URL.createObjectURL(f);
    userHtml += f.type.startsWith('video/')
      ? `<video src="${url}" controls muted></video>`
      : `<img src="${url}">`;
  }
  addMsg('user', userHtml);

  const fd = new FormData();
  fd.append('message', text);
  fd.append('role', document.getElementById('role').value);
  for (const f of attachments) fd.append('files', f);
  msgEl.value = ''; attachments = []; renderPreviews();
  sendBtn.disabled = true;
  const pending = addMsg('bot', '<i>thinking…</i>');

  try {
    const r = await fetch('/api/chat', { method: 'POST', body: fd });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    let html = esc(data.answer);
    if (data.evidence.length) {
      html += '<div class="evidence">' + data.evidence.map(ev =>
        `<span class="chip ${ev.fresh ? '' : 'stale'}" title="${esc(ev.summary)}">` +
        `${esc(ev.source)} · ${new Date(ev.observed_at).toLocaleTimeString()}${ev.fresh ? '' : ' · STALE'}</span>`
      ).join('') + '</div>';
    }
    for (const n of data.notes) html += `<div class="note">⚠ ${esc(n)}</div>`;
    html += `<div class="meta">intent: ${data.intent.join(', ')} · role: ${data.role} · model: ${data.model}</div>`;
    pending.innerHTML = html;
    if (data.escalated) pending.classList.add('escalated');
  } catch (err) {
    pending.innerHTML = '⚠ ' + esc(String(err));
    pending.classList.add('escalated');
  } finally {
    sendBtn.disabled = false;
    chat.scrollTop = chat.scrollHeight;
  }
});

msgEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
</script>
</body>
</html>
